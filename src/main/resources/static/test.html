<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }

        /* 背景动画粒子 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            animation: float 8s infinite ease-in-out;
        }

        .particle:nth-child(1) { width: 80px; height: 80px; left: 10%; top: 20%; animation-delay: 0s; }
        .particle:nth-child(2) { width: 60px; height: 60px; left: 75%; top: 15%; animation-delay: 1s; }
        .particle:nth-child(3) { width: 100px; height: 100px; left: 20%; top: 60%; animation-delay: 2s; }
        .particle:nth-child(4) { width: 50px; height: 50px; left: 60%; top: 65%; animation-delay: 3s; }
        .particle:nth-child(5) { width: 70px; height: 70px; left: 85%; top: 45%; animation-delay: 4s; }
        .particle:nth-child(6) { width: 40px; height: 40px; left: 45%; top: 30%; animation-delay: 5s; }
        .particle:nth-child(7) { width: 90px; height: 90px; left: 35%; top: 80%; animation-delay: 6s; }
        .particle:nth-child(8) { width: 55px; height: 55px; left: 90%; top: 75%; animation-delay: 7s; }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(-40px) scale(1.1);
            }
        }

        /* 主卡片 */
        .welcome-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 60px 50px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(255, 255, 255, 0.3);
            max-width: 520px;
            width: 90%;
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 图标区域 */
        .icon-wrapper {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin-bottom: 28px;
            animation: pulse 3s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.5); }
            50% { box-shadow: 0 0 0 20px rgba(102, 126, 234, 0); }
        }

        .icon-wrapper svg {
            width: 48px;
            height: 48px;
            fill: white;
        }

        /* 标题 */
        .welcome-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .welcome-title .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 副标题 */
        .welcome-subtitle {
            font-size: 1.05rem;
            color: #718096;
            margin-bottom: 36px;
            line-height: 1.7;
        }

        /* 信息标签 */
        .info-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 36px;
        }

        .info-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            transition: all 0.3s ease;
        }

        .info-tag:hover {
            background: rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }

        .info-tag .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* 按钮 */
        .btn-group {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-primary {
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .btn-outline {
            color: #667eea;
            background: transparent;
            border: 2px solid #667eea;
        }

        .btn-outline:hover {
            background: rgba(102, 126, 234, 0.08);
            transform: translateY(-3px);
        }

        /* 页脚 */
        .welcome-footer {
            margin-top: 32px;
            font-size: 0.85rem;
            color: #a0aec0;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .welcome-card {
                padding: 40px 28px;
                border-radius: 20px;
            }

            .welcome-title {
                font-size: 1.7rem;
            }

            .welcome-subtitle {
                font-size: 0.95rem;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<!-- 背景浮动粒子 -->
<div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
</div>

<!-- 欢迎卡片 -->
<div class="welcome-card">
    <!-- 图标 -->
    <div class="icon-wrapper">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
        </svg>
    </div>

    <!-- 标题 -->
    <h1 class="welcome-title">
        欢迎来到<br><span class="gradient-text">Spring Boot 3</span>
    </h1>

    <!-- 副标题 -->
    <p class="welcome-subtitle">
        一个基于 Spring Boot 3 的现代化 Web 应用，<br>提供稳定高效的后端服务。
    </p>

    <!-- 状态标签 -->
    <div class="info-tags">
            <span class="info-tag">
                <span class="dot"></span> 服务运行中
            </span>
        <span class="info-tag">
                ⚡ Spring Boot 3
            </span>
        <span class="info-tag">
                ☕ Java 17
            </span>
    </div>

    <!-- 按钮组 -->
    <div class="btn-group">
        <a href="/" class="btn btn-primary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            返回首页
        </a>
        <a href="https://spring.io/projects/spring-boot" target="_blank" class="btn btn-outline">
            📖 文档
        </a>
    </div>

    <!-- 页脚 -->
    <p class="welcome-footer">
        Powered by Spring Boot 3 &copy; 2026
    </p>
</div>
</body>
</html>
